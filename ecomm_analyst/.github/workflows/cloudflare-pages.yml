# Build static Next app and deploy `frontend/out` to Cloudflare Pages.
# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Variable: NEXT_PUBLIC_API_URL (GitHub → Settings → Variables) so the build bakes in your API base URL
name: Deploy frontend to Cloudflare Pages
on:
  push:
    branches: [main, master]
    paths:
      - "ecomm_analyst/frontend/**"
      - "ecomm_analyst/.github/workflows/cloudflare-pages.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ecomm_analyst/frontend/package-lock.json
      - name: Build static site
        working-directory: ecomm_analyst/frontend
        run: npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=ecomm-analyst-frontend
          workingDirectory: ecomm_analyst/frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
