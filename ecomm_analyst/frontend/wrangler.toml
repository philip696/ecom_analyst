# Optional: for `npx wrangler pages deploy` from this directory.
# In the Cloudflare dashboard, set:
#   Root directory: ecomm_analyst/frontend (this repo layout)
#   Build command:   npm ci && npm run build
#   Build output:    out
#
# Required on the **Pages** project (not the Worker): Environment variable
#   NEXT_PUBLIC_API_URL = https://<your-worker>.workers.dev   (no trailing slash)
# so `next build` bakes in the API origin. "Build environment variables: (none found)" in logs
# only refers to [vars] below; dashboard vars still apply — add NEXT_PUBLIC_API_URL in the UI.
name = "ecomm-analyst-frontend"
compatibility_date = "2024-11-01"
pages_build_output_dir = "out"
